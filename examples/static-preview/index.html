<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Youp Grid Static Preview</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #172033;
        background: #f4f7fb;
      }

      body {
        margin: 0;
      }

      main {
        max-width: 1080px;
        margin: 0 auto;
        padding: 32px;
      }

      .toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 16px;
      }

      h1 {
        margin: 0;
        font-size: 24px;
        line-height: 1.2;
      }

      .toolbar input {
        width: 220px;
        padding: 9px 12px;
        border: 1px solid #d8dee8;
        border-radius: 6px;
        font: inherit;
      }

      .grid {
        border: 1px solid #d8dee8;
        background: #fff;
        overflow: auto;
      }

      .row {
        display: flex;
        min-width: 760px;
        border-bottom: 1px solid #d8dee8;
      }

      .row.header {
        position: sticky;
        top: 0;
        background: #f5f7fb;
        color: #64748b;
        font-weight: 700;
      }

      .row:not(.header):hover {
        background: #eef6ff;
      }

      .row.selected {
        background: #dbeafe;
      }

      .cell {
        flex: 1 1 150px;
        padding: 10px 12px;
        border-right: 1px solid #d8dee8;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .cell.small {
        flex-basis: 110px;
      }

      .status {
        display: inline-flex;
        align-items: center;
        min-width: 64px;
        justify-content: center;
        padding: 3px 8px;
        border-radius: 999px;
        background: #e7f7ef;
        color: #166534;
        font-size: 12px;
        font-weight: 700;
      }

      .status.warn {
        background: #fff3da;
        color: #92400e;
      }

      @media (max-width: 720px) {
        main {
          padding: 18px;
        }

        .toolbar {
          align-items: stretch;
          flex-direction: column;
        }

        .toolbar input {
          width: auto;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="toolbar">
        <h1>Youp Grid Static Preview</h1>
        <input type="search" placeholder="Filter symbol" aria-label="Filter symbol" />
      </section>
      <section class="grid" role="grid" aria-rowcount="8" aria-colcount="5">
        <div class="row header" role="row">
          <div class="cell" role="columnheader">Desk ↑</div>
          <div class="cell small" role="columnheader">Symbol</div>
          <div class="cell" role="columnheader">Quantity</div>
          <div class="cell small" role="columnheader">Price</div>
          <div class="cell small" role="columnheader">Status</div>
        </div>
        <div class="row selected" role="row" aria-selected="true">
          <div class="cell" role="gridcell">Equity</div>
          <div class="cell small" role="gridcell">AAPL</div>
          <div class="cell" role="gridcell">12,400</div>
          <div class="cell small" role="gridcell">$187.20</div>
          <div class="cell small" role="gridcell"><span class="status">Open</span></div>
        </div>
        <div class="row" role="row">
          <div class="cell" role="gridcell">Rates</div>
          <div class="cell small" role="gridcell">US10Y</div>
          <div class="cell" role="gridcell">8,100</div>
          <div class="cell small" role="gridcell">$101.44</div>
          <div class="cell small" role="gridcell"><span class="status">Open</span></div>
        </div>
        <div class="row" role="row">
          <div class="cell" role="gridcell">Credit</div>
          <div class="cell small" role="gridcell">HYG</div>
          <div class="cell" role="gridcell">3,920</div>
          <div class="cell small" role="gridcell">$77.82</div>
          <div class="cell small" role="gridcell"><span class="status warn">Filled</span></div>
        </div>
        <div class="row" role="row">
          <div class="cell" role="gridcell">FX</div>
          <div class="cell small" role="gridcell">USD/KRW</div>
          <div class="cell" role="gridcell">1,500,000</div>
          <div class="cell small" role="gridcell">$1,361.40</div>
          <div class="cell small" role="gridcell"><span class="status">Open</span></div>
        </div>
      </section>
    </main>
  </body>
</html>
